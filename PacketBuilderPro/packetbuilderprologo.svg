<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="400" height="350">

  <!-- Background -->
  <rect width="400" height="350" fill="#87CEEB"/>
  <!-- Ground -->
  <rect x="0" y="290" width="400" height="60" fill="#8B6914"/>

  <!-- === BRICK WALL === -->
  <!-- Row 1 -->
  <rect x="60" y="250" width="60" height="25" fill="#B85C38" stroke="#888" stroke-width="1" rx="1"/>
  <rect x="125" y="250" width="60" height="25" fill="#C4622D" stroke="#888" stroke-width="1" rx="1"/>
  <rect x="190" y="250" width="60" height="25" fill="#B85C38" stroke="#888" stroke-width="1" rx="1"/>
  <rect x="255" y="250" width="60" height="25" fill="#C4622D" stroke="#888" stroke-width="1" rx="1"/>
  <!-- Row 2 (offset) -->
  <rect x="90" y="225" width="60" height="25" fill="#C4622D" stroke="#888" stroke-width="1" rx="1"/>
  <rect x="155" y="225" width="60" height="25" fill="#B85C38" stroke="#888" stroke-width="1" rx="1"/>
  <rect x="220" y="225" width="60" height="25" fill="#C4622D" stroke="#888" stroke-width="1" rx="1"/>
  <!-- Row 3 (offset back) -->
  <rect x="60" y="200" width="60" height="25" fill="#B85C38" stroke="#888" stroke-width="1" rx="1"/>
  <rect x="125" y="200" width="60" height="25" fill="#C4622D" stroke="#888" stroke-width="1" rx="1"/>
  <rect x="190" y="200" width="60" height="25" fill="#B85C38" stroke="#888" stroke-width="1" rx="1"/>
  <!-- Mortar on top (fresh) -->
  <rect x="60" y="197" width="190" height="5" fill="#D3C9A0" opacity="0.8"/>

  <!-- === MASON (stick figure) === -->
  <!-- Legs -->
  <line x1="310" y1="240" x2="295" y2="285" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="310" y1="240" x2="325" y2="285" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <!-- Feet -->
  <line x1="295" y1="285" x2="283" y2="288" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="325" y1="285" x2="337" y2="288" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <!-- Body -->
  <line x1="310" y1="195" x2="310" y2="240" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="310" cy="183" r="14" fill="#F5CBA7" stroke="#333" stroke-width="2"/>
  <!-- Hard hat -->
  <ellipse cx="310" cy="174" rx="16" ry="5" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
  <rect x="296" y="169" width="28" height="8" fill="#FFD700" stroke="#B8860B" stroke-width="1.5" rx="3"/>
  <!-- Eyes -->
  <circle cx="305" cy="183" r="2" fill="#333"/>
  <circle cx="315" cy="183" r="2" fill="#333"/>
  <!-- Smile -->
  <path d="M305 189 Q310 193 315 189" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Right arm reaching forward to wall -->
  <line x1="310" y1="205" x2="280" y2="200" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <!-- Forearm -->
  <line x1="280" y1="200" x2="258" y2="196" stroke="#333" stroke-width="4" stroke-linecap="round"/>

  <!-- Left arm down -->
  <line x1="310" y1="205" x2="330" y2="225" stroke="#333" stroke-width="4" stroke-linecap="round"/>

  <!-- === MAIL ENVELOPE TROWEL === -->
  <!-- Envelope body -->
  <rect x="220" y="188" width="38" height="26" fill="#FFFDE7" stroke="#F9A825" stroke-width="2" rx="2"/>
  <!-- Envelope flap (V shape) -->
  <polyline points="220,188 239,202 258,188" fill="none" stroke="#F9A825" stroke-width="2"/>
  <!-- Envelope bottom fold lines -->
  <line x1="220" y1="214" x2="235" y2="202" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="258" y1="214" x2="243" y2="202" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Handle (connecting envelope to hand) -->
  <line x1="258" y1="201" x2="268" y2="198" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <!-- Mortar drip from envelope -->
  <path d="M228 214 Q226 220 228 224" stroke="#D3C9A0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M238 214 Q236 222 239 227" stroke="#D3C9A0" stroke-width="2.5" fill="none" stroke-linecap="round"/>

</svg>